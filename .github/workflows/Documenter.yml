name: Documentation

# Only rebuild/deploy the site when the docs change — not on every push to the
# repo. (The workflow file itself is included so changes to it still deploy;
# trigger a build by hand via the Actions tab for anything else.)
on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/Documenter.yml'
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/Documenter.yml'
  workflow_dispatch:

# Needed for Documenter to push to gh-pages and to comment preview links on PRs.
permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Instantiate docs environment
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()'
      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: julia --project=docs docs/make.jl
