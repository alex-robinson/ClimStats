<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ClimStats logo">
  <title>ClimStats</title>
  <defs>
    <clipPath id="round">
      <rect x="8" y="8" width="240" height="240" rx="44" ry="44"/>
    </clipPath>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0b1f3a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- warming stripes: cold/past (blue) on the left, warm/now (red) on the right -->
  <g clip-path="url(#round)">
    <rect x="8"   y="8" width="27" height="240" fill="#08306b"/>
    <rect x="35"  y="8" width="27" height="240" fill="#2171b5"/>
    <rect x="62"  y="8" width="27" height="240" fill="#4292c6"/>
    <rect x="89"  y="8" width="27" height="240" fill="#9ecae1"/>
    <rect x="116" y="8" width="27" height="240" fill="#fddbc7"/>
    <rect x="143" y="8" width="27" height="240" fill="#f4a582"/>
    <rect x="170" y="8" width="27" height="240" fill="#d6604d"/>
    <rect x="197" y="8" width="27" height="240" fill="#b2182b"/>
    <rect x="224" y="8" width="24" height="240" fill="#67001f"/>

    <!-- rising statistical trend line across the stripes -->
    <polyline points="32,196 80,168 112,182 156,120 200,96 232,56"
              fill="none" stroke="#0b1f3a" stroke-opacity="0.30"
              stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="32,196 80,168 112,182 156,120 200,96 232,56"
              fill="none" stroke="#ffffff"
              stroke-width="10" stroke-linecap="round" stroke-linejoin="round"
              filter="url(#soft)"/>

    <!-- data points -->
    <g fill="#ffffff" stroke="#0b1f3a" stroke-width="2.5">
      <circle cx="32"  cy="196" r="6.5"/>
      <circle cx="80"  cy="168" r="6.5"/>
      <circle cx="112" cy="182" r="6.5"/>
      <circle cx="156" cy="120" r="6.5"/>
      <circle cx="200" cy="96"  r="6.5"/>
      <circle cx="232" cy="56"  r="6.5"/>
    </g>
  </g>

  <!-- crisp border -->
  <rect x="8" y="8" width="240" height="240" rx="44" ry="44"
        fill="none" stroke="#0b1f3a" stroke-opacity="0.18" stroke-width="2"/>
</svg>
